<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quaxion - (Chrome Offline Game)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            touch-action: none;
            font-family: 'Press Start 2P', system-ui;
        }
        
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        canvas {
            border: 8px solid #fff;
            box-shadow: 0 0 40px rgba(255,255,255,0.6);
            image-rendering: pixelated;
            max-width: 100%;
            max-height: 100%;
        }
        
        #score {
            position: absolute;
            top: 25px;
            right: 40px;
            color: #fff;
            font-size: 28px;
            text-shadow: 0 0 10px #fff;
            z-index: 20;
            pointer-events: none;
        }
        
        #mobile-controls {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 30;
            pointer-events: none;
        }
        
        .control-btn {
            width: 90px;
            height: 90px;
            background: rgba(255,255,255,0.15);
            border: 6px solid #fff;
            color: #fff;
            font-size: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            box-shadow: 0 0 20px #fff;
            pointer-events: auto;
            user-select: none;
            touch-action: manipulation;
        }
        
        #start-screen, #game-over-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            border: 8px solid #fff;
            padding: 40px 60px;
            text-align: center;
            color: #fff;
            font-size: 24px;
            box-shadow: 0 0 50px #fff;
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 100;
        }
        
        button {
            margin-top: 25px;
            padding: 18px 50px;
            font-family: 'Press Start 2P', system-ui;
            font-size: 24px;
            background: #000;
            color: #fff;
            border: 6px solid #fff;
            cursor: pointer;
        }
        
        button:hover {
            background: #fff;
            color: #000;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="canvas" width="900" height="400"></canvas>
        
        <!-- Score -->
        <div id="score">
            HI <span id="hi-score">00000</span> 
            <span id="current-score">00000</span>
        </div>
        
        <!-- Mobile Controls -->
        <div id="mobile-controls">
            <button class="control-btn" id="btn-jump">↑</button>
            <button class="control-btn" id="btn-crouch">↓</button>
            <button class="control-btn" id="btn-shoot">🔫</button>
        </div>
        
        <!-- Start Screen -->
        <div id="start-screen">
            <h1 style="font-size:48px; margin:0; color:#ff0;">DUCK RUNNER</h1>
            <p style="margin:15px 0 30px; color:#aaa;">Chrome Offline Style</p>
            <button onclick="startGame()">PRESS START</button>
            <p style="margin-top:30px; font-size:18px;">SPACE / ↑ = Jump<br>↓ = Crouch<br>S / 🔫 = Shoot Bird</p>
        </div>
        
        <!-- Game Over -->
        <div id="game-over-screen">
            <h1 style="color:#f33; margin:0;">GAME OVER</h1>
            <div id="final-score-text" style="margin:20px 0; font-size:28px;"></div>
            <button onclick="restartGame()">RESTART</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
       
        let gameState = 'start';
        let score = 0;
        let hiScore = localStorage.getItem('duckHiScore') || 0;
        let speed = 5;
        let lastTime = 0;
        let dayNight = 0;
        let jumpHeld = false;
       
        let duck = {
            x: 120, y: 280, vy: 0, width: 60, height: 60,
            isJumping: false, isCrouching: false, legFrame: 0
        };
       
        let obstacles = [];
        let clouds = [];
        let projectiles = [];
        let groundOffset = 0;
       
        const GRAVITY = 0.75;
        const JUMP_FORCE = -17;
       
                // Audio (procedural)
        let audioCtx;
        function playSound(type) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            if (type === 'jump') {
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                gain.gain.value = 0.4;
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                
            } else if (type === 'shoot') {
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
                gain.gain.value = 0.6;
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
                
            } else if (type === 'hit') {           // Game Over sound (bad)
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                gain.gain.value = 0.5;
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                
            } else if (type === 'birdhit') {      
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                gain.gain.value = 0.7;
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
                
                // Extra high tone for success feel
                setTimeout(() => {
                    const osc2 = audioCtx.createOscillator();
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(1200, audioCtx.currentTime);
                    const gain2 = audioCtx.createGain();
                    gain2.gain.value = 0.4;
                    gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                    osc2.connect(gain2).connect(audioCtx.destination);
                    osc2.start();
                    osc2.stop(audioCtx.currentTime + 0.2);
                }, 50);
            }
            
            osc.connect(gain).connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.6);
        }
       
        function initClouds() {
            clouds = [];
            for (let i = 0; i < 6; i++) {
                clouds.push({ x: Math.random() * canvas.width * 2, y: 60 + Math.random() * 80, speed: 0.8 + Math.random() });
            }
        }
       
        function drawBackground() {
            const isDay = dayNight < 0.5;
            ctx.fillStyle = isDay ? '#87CEEB' : '#1a1a3d';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
           
            ctx.fillStyle = isDay ? '#ffeb3b' : '#ddd';
            ctx.shadowBlur = 30;
            ctx.shadowColor = isDay ? '#ffeb3b' : '#aaa';
            ctx.beginPath();
            ctx.arc(720, 90, 35, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
           
            ctx.fillStyle = isDay ? '#fff' : '#aaa';
            clouds.forEach(c => {
                ctx.globalAlpha = isDay ? 1 : 0.6;
                ctx.fillRect(c.x, c.y, 80, 30);
                ctx.fillRect(c.x + 20, c.y - 10, 50, 35);
                ctx.fillRect(c.x + 50, c.y + 5, 40, 25);
                c.x -= c.speed;
                if (c.x < -150) c.x = canvas.width + 100;
            });
            ctx.globalAlpha = 1;
           
            ctx.fillStyle = '#c2b280';
            ctx.fillRect(0, 340, canvas.width, 60);
           
            ctx.strokeStyle = '#a38d5f';
            ctx.lineWidth = 4;
            for (let x = groundOffset % 40; x < canvas.width; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, 340);
                ctx.lineTo(x + 15, 370);
                ctx.stroke();
            }
            groundOffset -= speed * 1.2;
        }
       
        function drawDuck() {
            const dy = duck.isCrouching ? duck.y + 20 : duck.y;
            ctx.fillStyle = '#f4d03f';
            ctx.fillRect(duck.x + 5, dy + 10, 45, 35);
            ctx.beginPath(); ctx.arc(duck.x + 48, dy + 22, 18, 0, Math.PI * 2); ctx.fill();
           
            ctx.fillStyle = '#e67e22';
            ctx.beginPath();
            ctx.moveTo(duck.x + 62, dy + 18);
            ctx.lineTo(duck.x + 75, dy + 25);
            ctx.lineTo(duck.x + 62, dy + 32);
            ctx.fill();
           
            ctx.fillStyle = '#111';
            ctx.beginPath(); ctx.arc(duck.x + 55, dy + 18, 6, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(duck.x + 57, dy + 16, 3, 0, Math.PI * 2); ctx.fill();
           
            ctx.fillStyle = '#e67e22';
            ctx.beginPath(); ctx.ellipse(duck.x + 20, dy + 25, 18, 12, 0.3, 0, Math.PI * 2); ctx.fill();
           
            ctx.strokeStyle = '#e67e22';
            ctx.lineWidth = 8;
            const legOffset = duck.isJumping ? 0 : Math.sin(duck.legFrame) * 4;
            ctx.beginPath();
            ctx.moveTo(duck.x + 15, dy + 45); ctx.lineTo(duck.x + 12, dy + 55 + legOffset);
            ctx.moveTo(duck.x + 35, dy + 45); ctx.lineTo(duck.x + 38, dy + 55 - legOffset);
            ctx.stroke();
           
            duck.legFrame += 0.3;
        }
       
        function drawCactus(ob) {
            ctx.fillStyle = '#2ecc71';
            ctx.fillRect(ob.x, ob.y, 22, 70);
            ctx.fillRect(ob.x - 12, ob.y + 25, 18, 12);
            ctx.fillRect(ob.x + 16, ob.y + 35, 18, 12);
        }
       
        function drawBird(ob) {
            ctx.strokeStyle = '#34495e';
            ctx.lineWidth = 7;
            ctx.beginPath(); ctx.moveTo(ob.x, ob.y); ctx.lineTo(ob.x + 38, ob.y); ctx.stroke();
           
            const wing = Math.sin(Date.now() / 80) * 8;
            ctx.beginPath();
            ctx.moveTo(ob.x + 15, ob.y - 5); ctx.lineTo(ob.x + 25, ob.y - 18 + wing);
            ctx.moveTo(ob.x + 15, ob.y + 5); ctx.lineTo(ob.x + 25, ob.y + 18 - wing);
            ctx.stroke();
           
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(ob.x + 38, ob.y - 5, 10, 6);
        }
       
        function spawnObstacle() {
            if (obstacles.length > 0) {
                const last = obstacles[obstacles.length - 1];
                if (last.x > canvas.width - 220) return;
            }
           
            if (Math.random() < 0.58) {
                obstacles.push({ type: 'cactus', x: canvas.width + 80, y: 290, width: 22, height: 70 });
            } else {
                obstacles.push({ type: 'bird', x: canvas.width + 90, y: 130 + Math.random() * 140, width: 55, height: 40 });
            }
        }
       
        function update(delta) {
            if (gameState !== 'playing') return;
           
            speed = 5 + Math.floor(score / 500) * 0.8;
            dayNight = (dayNight + 0.0003) % 1;
           
                        // Duck physics - Variable Jump Height
            if (duck.isJumping) {
                // If still holding jump and going up → reduced gravity (higher jump)
                if (jumpHeld && duck.vy < 0) {
                    duck.vy += GRAVITY * 0.45;   // Lower gravity while holding
                } else {
                    duck.vy += GRAVITY;          // Normal gravity
                }
                
                duck.y += duck.vy;
                
                // Land on ground
                if (duck.y >= 280) {
                    duck.y = 280;
                    duck.isJumping = false;
                    duck.vy = 0;
                    jumpHeld = false;
                }
            }
           
            // Move obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const ob = obstacles[i];
                ob.x -= speed;
               
                if (duck.x + (duck.isCrouching ? 40 : duck.width) > ob.x &&
                    duck.x < ob.x + ob.width &&
                    (duck.isCrouching ? duck.y + 40 : duck.y) + (duck.isCrouching ? 30 : duck.height) > ob.y &&
                    duck.y < ob.y + ob.height) {
                    gameOver();
                    return;
                }
               
                if (ob.x < -100) obstacles.splice(i, 1);
            }
           
            // Move projectiles + collision with birds
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.x += p.speed;
               
                for (let j = obstacles.length - 1; j >= 0; j--) {
                    const ob = obstacles[j];
                                        if (ob.type === 'bird' &&
                        p.x + p.width > ob.x && p.x < ob.x + ob.width &&
                        p.y > ob.y - 10 && p.y < ob.y + ob.height + 10) {
                        
                        obstacles.splice(j, 1);
                        projectiles.splice(i, 1);
                        playSound('birdhit');   
                        break;
                    }
                }
                if (p.x > canvas.width + 50) projectiles.splice(i, 1);
            }
           
            // Spawn new obstacles
            if (Math.random() < 0.018 + score / 30000) spawnObstacle();
           
            score += 1;
            document.getElementById('current-score').textContent = String(Math.floor(score)).padStart(5, '0');
            groundOffset -= speed;
        }
       
        function draw() {
            drawBackground();
            drawDuck();
           
            // Draw projectiles
            ctx.fillStyle = '#ffeb3b';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff9800';
            projectiles.forEach(p => {
                ctx.fillRect(p.x, p.y - 4, p.width, 8);
                ctx.fillStyle = '#ff5722';
                ctx.fillRect(p.x + 18, p.y - 6, 12, 12);
                ctx.fillStyle = '#ffeb3b';
            });
            ctx.shadowBlur = 0;
           
            // Draw obstacles
            obstacles.forEach(ob => {
                if (ob.type === 'cactus') drawCactus(ob);
                else drawBird(ob);
            });
           
            ctx.strokeStyle = '#2c3e50';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(0, 340);
            ctx.lineTo(canvas.width, 340);
            ctx.stroke();
        }
       
        function gameLoop(ts) {
            if (!lastTime) lastTime = ts;
            const delta = ts - lastTime;
            lastTime = ts;
            update(delta);
            draw();
            requestAnimationFrame(gameLoop);
        }

        function jump() {
            if (gameState === 'playing' && !duck.isJumping) {
                duck.isJumping = true;
                duck.vy = JUMP_FORCE;     // Strong initial jump
                jumpHeld = true;
                playSound('jump');
            }
        }
       
        function crouch(state) {
            if (gameState === 'playing') duck.isCrouching = state;
        }
       
        function shoot() {
            if (gameState !== 'playing') return;
            playSound('shoot');
            projectiles.push({
                x: duck.x + 70,
                y: duck.y + 22,
                width: 25,
                speed: 18
            });
        }
       
        function gameOver() {
            gameState = 'over';
            playSound('hit');
            if (score > hiScore) {
                hiScore = score;
                localStorage.setItem('duckHiScore', hiScore);
            }
            document.getElementById('final-score-text').innerHTML = `
                SCORE <span style="color:#ff0">${String(Math.floor(score)).padStart(5,'0')}</span><br>
                HI <span style="color:#ff0">${String(Math.floor(hiScore)).padStart(5,'0')}</span>
            `;
            document.getElementById('game-over-screen').style.display = 'flex';
        }
       
        window.startGame = function() {
            document.getElementById('start-screen').style.display = 'none';
            gameState = 'playing';
            score = 0; speed = 5; obstacles = []; projectiles = [];
            duck.y = 280; duck.isJumping = false; duck.isCrouching = false;
            document.getElementById('current-score').textContent = '00000';
            spawnObstacle();
        };
       
        window.restartGame = function() {
            document.getElementById('game-over-screen').style.display = 'none';
            startGame();
        };
       
        function setupControls() {
                   
            document.addEventListener('keydown', e => {
                if (gameState !== 'playing') return;
                
                if ((e.key === ' ' || e.key === 'ArrowUp') && !duck.isJumping) {
                    jump();
                }
                if (e.key === 'ArrowDown') crouch(true);
                if (e.key.toLowerCase() === 's') shoot();
            });
            
            document.addEventListener('keyup', e => {
                if (e.key === ' ' || e.key === 'ArrowUp') {
                    jumpHeld = false;           // ← Release jump = normal gravity
                }
                if (e.key === 'ArrowDown') crouch(false);
            });
           
            // ✅ Updated Touch Controls
const btnJump = document.getElementById('btn-jump');
const btnCrouch = document.getElementById('btn-crouch');
const btnShoot = document.getElementById('btn-shoot');

btnJump.addEventListener('touchstart', e => {
    e.preventDefault();
    jump();
    jumpHeld = true;           // ← Important for variable height
});

btnJump.addEventListener('touchend', e => {
    e.preventDefault();
    jumpHeld = false;          // ← Release = normal gravity
});

btnCrouch.addEventListener('touchstart', e => {
    e.preventDefault();
    crouch(true);
});

btnCrouch.addEventListener('touchend', e => {
    e.preventDefault();
    crouch(false);
});

btnShoot.addEventListener('touchstart', e => {
    e.preventDefault();
    shoot();
});
           // Mouse support (desktop testing)
btnJump.addEventListener('mousedown', e => {
    e.preventDefault();
    jump();
    jumpHeld = true;
});

btnJump.addEventListener('mouseup', e => {
    e.preventDefault();
    jumpHeld = false;
});

btnJump.addEventListener('mouseleave', e => {
    jumpHeld = false;
});

            document.getElementById('btn-jump').addEventListener('mousedown', jump);
            document.getElementById('btn-crouch').addEventListener('mousedown', () => crouch(true));
            document.getElementById('btn-crouch').addEventListener('mouseup', () => crouch(false));
            document.getElementById('btn-shoot').addEventListener('mousedown', shoot);
        }
       
        function init() {
            document.getElementById('hi-score').textContent = String(hiScore).padStart(5, '0');
            initClouds();
            setupControls();
            document.getElementById('start-screen').style.display = 'flex';
            requestAnimationFrame(gameLoop);
        }
       
        window.onload = init;
    </script>
</body>
</html>
